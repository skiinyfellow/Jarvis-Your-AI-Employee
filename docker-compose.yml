version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: jarvis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  openjarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-core
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
      - redis
      - ollama
    env_file:
      - .env
    volumes:
      - ./core:/app/core
      - ./modules:/app/modules

volumes:
  postgres_data:
  qdrant_data:
  ollama_data: